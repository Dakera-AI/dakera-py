name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        python-version: ${{ contains(github.event.pull_request.labels.*.name, 'full-matrix') && fromJson('["3.10","3.11","3.12"]') || fromJson('["3.10","3.12"]') }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,async]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/

      - name: Test with pytest
        run: pytest tests/ -v --ignore=tests/test_integration.py

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      dakera:
        image: ghcr.io/dakera-ai/dakera:latest
        ports:
          - 3300:3000
        env:
          DAKERA_AUTH_ENABLED: "false"
        options: >-
          --health-cmd "curl -f http://127.0.0.1:3000/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
        credentials:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,async]"

      - name: Wait for Dakera to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3300/health; then
              echo "Dakera is ready"
              break
            fi
            echo "Waiting for Dakera... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          DAKERA_TEST_URL: http://localhost:3300
        run: pytest tests/test_integration.py -v
