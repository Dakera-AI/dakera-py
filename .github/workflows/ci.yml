name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: [self-hosted, linux, arm64]
    strategy:
      matrix:
        # Full matrix on PRs labeled 'full-matrix'; default: min + max only (saves ~50% CI minutes)
        python-version: ${{ contains(github.event.pull_request.labels.*.name, 'full-matrix') && fromJson('["3.10","3.11","3.12"]') || fromJson('["3.10","3.12"]') }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,async]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/

      - name: Test with pytest
        run: pytest tests/ -v
