name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: [self-hosted, linux, arm64]
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Verify manifest version matches release tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: pyproject.toml='$MANIFEST_VERSION' release tag='$TAG_VERSION'"
            echo ""
            echo "Fix: bump pyproject.toml and src/dakera/__init__.py to '$TAG_VERSION',"
            echo "commit on the target SHA, delete this release, then recreate it on the bumped commit."
            echo ""
            echo "Root cause of DAK-7230 — this gate prevents registry rejects on version conflict."
            exit 1
          fi
          echo "✅ Version verified: pyproject.toml=$MANIFEST_VERSION matches release tag ${{ github.ref_name }}"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Set up QEMU (amd64 publisher on arm64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Trigger website version sync on every SDK release (DAK-5974).
  # Requires DOCS_CHECKOUT_TOKEN secret with write access to dakera-ai/website.
  trigger-website-sync:
    name: Trigger Website SDK Version Sync
    needs: publish
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Dispatch SDK version sync to website repo
        env:
          GH_TOKEN: ${{ secrets.DOCS_CHECKOUT_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::warning::DOCS_CHECKOUT_TOKEN not set in dakera-py repo — website SDK version sync skipped. Add this secret to enable automatic website updates on SDK release."
            exit 0
          fi
          gh api repos/dakera-ai/website/dispatches \
            --method POST \
            -f "event_type=dakera-sdk-release" \
            -f "client_payload[version]=${{ github.ref_name }}"
          echo "✅ Website SDK version sync dispatched: sdk=${{ github.ref_name }}"
