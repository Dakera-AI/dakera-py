# NOTE: Out-of-network repos that removed fork relationship are not detectable via GitHub API.

name: License Integrity Monitor

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-forks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute reference LICENSE hash
        id: ref-hash
        run: |
          HASH=$(sha256sum LICENSE | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Reference hash: $HASH"

      - name: Check forks for LICENSE modifications
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_HASH: ${{ steps.ref-hash.outputs.hash }}
        run: |
          VIOLATIONS=""
          PAGE=1
          while true; do
            FORKS=$(gh api "/repos/dakera-ai/dakera-py/forks?per_page=100&page=$PAGE" --jq '.[].full_name' 2>/dev/null || echo "")
            if [ -z "$FORKS" ]; then
              break
            fi
            while IFS= read -r FORK; do
              if [ -z "$FORK" ]; then
                continue
              fi
              CONTENT=$(gh api "/repos/$FORK/contents/LICENSE" --jq '.content' 2>/dev/null || echo "")
              if [ -z "$CONTENT" ]; then
                sleep 0.5
                continue
              fi
              FORK_HASH=$(echo "$CONTENT" | base64 -d 2>/dev/null | sha256sum | awk '{print $1}')
              if [ "$FORK_HASH" != "$REF_HASH" ]; then
                VIOLATIONS="$VIOLATIONS\n- $FORK (hash: $FORK_HASH)"
              fi
              sleep 0.5
            done <<< "$FORKS"
            PAGE=$((PAGE + 1))
          done

          if [ -n "$VIOLATIONS" ]; then
            BODY="## License integrity violation detected\n\nThe following forks have a modified LICENSE file:\n$VIOLATIONS\n\nReference hash: \`$REF_HASH\`\n\nPlease review these forks to ensure compliance with the MIT License terms."
            printf '%b' "$BODY" | gh issue create \
              --title "License integrity violation detected" \
              --body-file -
          else
            echo "All checked forks have unmodified LICENSE files."
          fi
